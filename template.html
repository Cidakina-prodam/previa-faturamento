<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prévia de Faturamento — PRODAM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:       #1a1d23;
    --ink-mid:   #4a5063;
    --ink-light: #8892a4;
    --rule:      #dde2ec;
    --surface:   #f5f7fb;
    --white:     #ffffff;

    --blue:      #1a56db;
    --blue-dim:  #e8eef9;
    --teal:      #0d9488;
    --teal-dim:  #e6f7f5;
    --amber:     #b45309;
    --amber-dim: #fef3c7;
    --slate:     #475569;
    --slate-dim: #f1f5f9;

    --radius:    6px;
    --font-mono: "Menlo", "Consolas", monospace;
  }

  body {
    font-family: "Inter", "Segoe UI", system-ui, sans-serif;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--surface);
  }

  .page { max-width: 1150px; margin: 0 auto; padding: 32px 24px 80px; }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 2px solid var(--blue);
    padding-bottom: 20px;
    margin-bottom: 28px;
  }
  .header-left h1 { font-size: 20px; font-weight: 700; color: var(--blue); letter-spacing: -.3px; }
  .header-left p { font-size: 12px; color: var(--ink-light); margin-top: 3px; }
  .header-right { text-align: right; flex-shrink: 0; }

  .kpi-strip { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .kpi {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 12px 18px;
    min-width: 140px;
    flex: 1;
  }
  .kpi-label { font-size: 11px; color: var(--ink-light); text-transform: uppercase; letter-spacing: .6px; }
  .kpi-value { font-size: 22px; font-weight: 700; color: var(--ink); margin-top: 2px; }

  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: var(--radius);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary  { background: var(--blue); color: #fff; }
  .btn-outline  { background: var(--white); color: var(--blue); border-color: var(--blue); }
  .btn-teal     { background: var(--teal); color: #fff; }

  .search-box {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 5px 10px;
  }
  .search-box input { border: none; outline: none; font-size: 12.5px; color: var(--ink); background: transparent; width: 200px; }

  /* ── seletor de ordenação ── */
  .ordenacao-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 18px;
  }
  .ordenacao-label { font-size: 12px; font-weight: 700; color: var(--ink-mid); margin-right: 4px; }
  .ord-btn {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink-mid);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .ord-btn:hover { border-color: var(--blue); color: var(--blue); }
  .ord-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  .projeto-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .projeto-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    background: var(--white);
    border-bottom: 1px solid var(--rule);
    transition: background .12s;
  }
  .projeto-header:hover { background: var(--blue-dim); }
  .projeto-chevron { font-size: 10px; color: var(--ink-light); transition: transform .2s; }
  .projeto-card.open .projeto-chevron { transform: rotate(90deg); }
  .projeto-nome { font-weight: 700; font-size: 13.5px; flex: 1; }
  .projeto-total { font-size: 13px; font-weight: 700; color: var(--blue); background: var(--blue-dim); border-radius: 20px; padding: 2px 10px; }

  .projeto-body { display: none; padding: 0; }
  .projeto-card.open .projeto-body { display: block; }

  .gds-block { border-top: 1px solid var(--rule); }
  .gds-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 16px 9px 28px;
    background: var(--slate-dim);
    cursor: pointer;
    user-select: none;
    transition: background .12s;
  }
  .gds-header:hover { background: #e2e8f0; }
  .gds-chevron { font-size: 9px; color: var(--ink-light); transition: transform .2s; }
  .gds-block.open .gds-chevron { transform: rotate(90deg); }
  .gds-nome { font-size: 12.5px; font-weight: 600; color: var(--slate); flex: 1; }
  .gds-total { font-size: 11.5px; font-weight: 700; color: var(--teal); background: var(--teal-dim); border-radius: 20px; padding: 1px 9px; }

  .gds-body { display: none; }
  .gds-block.open .gds-body { display: block; }

  .ativ-block { border-top: 1px solid var(--rule); }
  .ativ-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px 7px 44px;
    background: var(--white);
    cursor: pointer;
    user-select: none;
    transition: background .12s;
  }
  .ativ-header:hover { background: var(--blue-dim); }
  .ativ-chevron { font-size: 8px; color: var(--ink-light); transition: transform .2s; }
  .ativ-block.open .ativ-chevron { transform: rotate(90deg); }
  .ativ-codigo { font-family: var(--font-mono); font-size: 11px; color: var(--ink-light); }
  .ativ-titulo { font-size: 12.5px; color: var(--ink); flex: 1; }
  .ativ-total { font-size: 11px; font-weight: 700; color: var(--amber); background: var(--amber-dim); border-radius: 20px; padding: 1px 9px; }

  .ativ-body { display: none; }
  .ativ-block.open .ativ-body { display: block; }

  .linhas-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .linhas-table th {
    text-align: left;
    padding: 6px 8px 6px 56px;
    font-size: 10.5px;
    color: var(--ink-light);
    text-transform: uppercase;
    letter-spacing: .5px;
    border-bottom: 1px solid var(--rule);
    background: var(--surface);
  }
  .linhas-table th:first-child { padding-left: 56px; }
  .linhas-table td { padding: 6px 8px; border-bottom: 1px solid var(--rule); color: var(--ink-mid); vertical-align: top; }
  .linhas-table td:first-child { padding-left: 56px; }
  .linhas-table tr:last-child td { border-bottom: none; }
  .linhas-table tr:hover td { background: #f8faff; }

  .rf-badge { display: inline-block; font-family: var(--font-mono); font-size: 10px; background: var(--slate-dim); color: var(--slate); border-radius: 4px; padding: 0 5px; margin-left: 4px; }
  .horas-cell { text-align: right; font-weight: 700; color: var(--ink); white-space: nowrap; }
  .data-cell { white-space: nowrap; color: var(--ink-light); font-size: 11px; }
  .os-cell { font-size: 11px; color: var(--ink-light); }

  .footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--rule); font-size: 11px; color: var(--ink-light); text-align: center; }

  .projeto-card.hidden, .gds-block.hidden, .ativ-block.hidden, tr.hidden { display: none !important; }

  @media print {
    .toolbar, .ordenacao-bar { display: none; }
    .projeto-body, .gds-body, .ativ-body { display: block !important; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-left">
      <h1>📊 Prévia de Faturamento</h1>
      <p>Período: <strong>%%PERIODO%%</strong> &nbsp;·&nbsp; Gerado em: %%GERADO_EM%%</p>
    </div>
    <div class="header-right">
      <span style="font-size:11px;color:var(--ink-light)">PRODAM · Gestão de Contratos</span>
    </div>
  </div>

  <div class="kpi-strip">
    <div class="kpi">
      <div class="kpi-label">Total de horas</div>
      <div class="kpi-value" id="kpi-horas">%%TOTAL_HORAS%%</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Registros</div>
      <div class="kpi-value" id="kpi-registros">%%TOTAL_REGISTROS%%</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Contratos</div>
      <div class="kpi-value" id="kpi-contratos">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Colaboradores</div>
      <div class="kpi-value" id="kpi-colab">—</div>
    </div>
  </div>

  <!-- SELETOR DE ORDENAÇÃO -->
  <div class="ordenacao-bar">
    <span class="ordenacao-label">Agrupar por:</span>
    <button class="ord-btn active" data-modo="gds_gdp" onclick="setModo('gds_gdp')">GDS / GDP</button>
    <button class="ord-btn" data-modo="colaborador" onclick="setModo('colaborador')">Colaborador → Data</button>
    <button class="ord-btn" data-modo="data" onclick="setModo('data')">Data → Colaborador</button>
    <button class="ord-btn" data-modo="atividade" onclick="setModo('atividade')">Atividade → Colaborador</button>
  </div>

  <div class="toolbar">
    <button class="btn btn-primary" onclick="expandAll()">▼ Expandir tudo</button>
    <button class="btn btn-outline" onclick="collapseAll()">▲ Recolher tudo</button>
    <button class="btn btn-teal" onclick="exportCSV()">⬇ Exportar CSV</button>

    <div class="search-box">
      <span style="color:var(--ink-light);font-size:13px">🔍</span>
      <input type="text" id="search-input" placeholder="Buscar contrato, GDS, atividade, nome…" oninput="filterTree(this.value)" />
    </div>
  </div>

  <div id="tree-root"></div>

  <div class="footer">
    Prévia de Faturamento PRODAM · Período %%PERIODO%% · Gerado em %%GERADO_EM%%
  </div>
</div>

<script>
// ── dados injetados pelo Python (lista plana de registros) ───────────────────
const RECORDS = %%RECORDS_JSON%%;
const CSV_DATA = %%CSV_DATA%%;

let currentModo = 'gds_gdp';

// ── utilitários ──────────────────────────────────────────────────────────────
function fmtH(h) {
  const totalMin = Math.round(h * 60);
  const hh = Math.floor(totalMin / 60);
  const mm = totalMin % 60;
  return `${hh}h${String(mm).padStart(2,'0')}`;
}

const NIVEL2_LABEL = {
  gds_gdp:     'GDS/GDP',
  colaborador: 'Colaborador',
  data:        'Data',
  atividade:   'Atividade',
};

// ── agrupamento dinâmico conforme modo ────────────────────────────────────────
function buildTree(modo) {
  // tree[proj][nivel2Key] = { label, atividades: { nivel3Key: { atividade, titulo, linhas[] } } }
  const tree = {};

  // Ordena registros conforme o modo antes de agrupar (preserva ordem dentro dos grupos)
  let sorted = [...RECORDS];
  if (modo === 'colaborador') {
    sorted.sort((a,b) => a.proj.localeCompare(b.proj) || a.nome.localeCompare(b.nome) || a.data_iso.localeCompare(b.data_iso));
  } else if (modo === 'data') {
    sorted.sort((a,b) => a.proj.localeCompare(b.proj) || a.data_iso.localeCompare(b.data_iso) || a.nome.localeCompare(b.nome));
  } else if (modo === 'atividade') {
    sorted.sort((a,b) => a.proj.localeCompare(b.proj) || a.atividade.localeCompare(b.atividade) || a.nome.localeCompare(b.nome));
  } else {
    sorted.sort((a,b) => a.proj.localeCompare(b.proj) || a.gds_gdp.localeCompare(b.gds_gdp) || a.atividade.localeCompare(b.atividade) || a.nome.localeCompare(b.nome));
  }

  for (const r of sorted) {
    const proj = r.proj;
    let nivel2Key, nivel2Label;

    if (modo === 'colaborador') {
      nivel2Key = r.nome || '(sem nome)';
      nivel2Label = nivel2Key;
    } else if (modo === 'data') {
      nivel2Key = r.data;
      nivel2Label = r.data;
    } else if (modo === 'atividade') {
      nivel2Key = `${r.atividade} — ${r.titulo}`;
      nivel2Label = nivel2Key;
    } else {
      nivel2Key = r.gds_gdp;
      nivel2Label = r.gds_gdp;
    }

    tree[proj] = tree[proj] || {};
    tree[proj][nivel2Key] = tree[proj][nivel2Key] || { label: nivel2Label, atividades: {} };

    // Nível 3: no modo "atividade" não repetimos (a atividade já é o nível 2),
    // nos demais modos o nível 3 é a atividade.
    let nivel3Key, mostraAtividade;
    if (modo === 'atividade') {
      nivel3Key = '—';
      mostraAtividade = false;
    } else {
      nivel3Key = `${r.atividade} — ${r.titulo}`;
      mostraAtividade = true;
    }

    const n2 = tree[proj][nivel2Key];
    n2.atividades[nivel3Key] = n2.atividades[nivel3Key] || {
      atividade: mostraAtividade ? r.atividade : '',
      titulo: mostraAtividade ? r.titulo : '',
      linhas: [],
    };
    n2.atividades[nivel3Key].linhas.push(r);
  }

  return tree;
}

function sumLinhas(linhas) {
  return linhas.reduce((s, l) => s + (l.horas || 0), 0);
}

// ── render ───────────────────────────────────────────────────────────────────
function build() {
  const tree = buildTree(currentModo);
  const root = document.getElementById('tree-root');
  root.innerHTML = '';

  let totalContratos = 0;
  const colaSet = new Set();

  for (const [proj, nivel2Dict] of Object.entries(tree)) {
    totalContratos++;
    const projCard = document.createElement('div');
    projCard.className = 'projeto-card';
    projCard.dataset.proj = proj.toLowerCase();

    let totalProj = 0;
    for (const n2 of Object.values(nivel2Dict))
      for (const ad of Object.values(n2.atividades))
        totalProj += sumLinhas(ad.linhas);

    const ph = document.createElement('div');
    ph.className = 'projeto-header';
    ph.innerHTML = `
      <span class="projeto-chevron">▶</span>
      <span class="projeto-nome">${proj}</span>
      <span class="projeto-total">${fmtH(totalProj)}</span>`;
    ph.onclick = () => projCard.classList.toggle('open');
    projCard.appendChild(ph);

    const pb = document.createElement('div');
    pb.className = 'projeto-body';

    for (const [nivel2Key, n2] of Object.entries(nivel2Dict)) {
      let totalN2 = 0;
      for (const ad of Object.values(n2.atividades)) totalN2 += sumLinhas(ad.linhas);

      const gdsBlock = document.createElement('div');
      gdsBlock.className = 'gds-block';
      gdsBlock.dataset.gds = n2.label.toLowerCase();

      const gh = document.createElement('div');
      gh.className = 'gds-header';
      gh.innerHTML = `
        <span class="gds-chevron">▶</span>
        <span class="gds-nome">${NIVEL2_LABEL[currentModo]}: ${n2.label}</span>
        <span class="gds-total">${fmtH(totalN2)}</span>`;
      gh.onclick = () => gdsBlock.classList.toggle('open');
      gdsBlock.appendChild(gh);

      const gb = document.createElement('div');
      gb.className = 'gds-body';

      for (const [ativKey, ad] of Object.entries(n2.atividades)) {
        const totalAtiv = sumLinhas(ad.linhas);
        const temAtividade = !!ad.atividade;

        const ativBlock = document.createElement('div');
        ativBlock.className = 'ativ-block';
        ativBlock.dataset.ativ = ativKey.toLowerCase();

        let ab;
        if (temAtividade) {
          const ah = document.createElement('div');
          ah.className = 'ativ-header';
          ah.innerHTML = `
            <span class="ativ-chevron">▶</span>
            <span class="ativ-codigo">${ad.atividade}</span>
            <span class="ativ-titulo">${ad.titulo}</span>
            <span class="ativ-total">${fmtH(totalAtiv)}</span>`;
          ah.onclick = () => ativBlock.classList.toggle('open');
          ativBlock.appendChild(ah);

          ab = document.createElement('div');
          ab.className = 'ativ-body';
        } else {
          ativBlock.classList.add('open');
          ab = document.createElement('div');
          ab.className = 'ativ-body';
          ab.style.display = 'block';
        }

        const tbl = document.createElement('table');
        tbl.className = 'linhas-table';
        tbl.innerHTML = `<thead><tr>
          <th>Nome</th>
          <th>Data</th>
          <th>GDS / GDP</th>
          <th>OS / Tipo</th>
          <th style="text-align:right;padding-right:24px">Horas</th>
        </tr></thead>`;
        const tbody = document.createElement('tbody');

        for (const ln of ad.linhas) {
          colaSet.add(ln.rf);
          const tr = document.createElement('tr');
          tr.dataset.nome = (ln.nome + ' ' + ln.rf).toLowerCase();
          const osInfo = [ln.os, ln.tipo].filter(Boolean).join(' · ') || '—';
          tr.innerHTML = `
            <td>${ln.nome}<span class="rf-badge">${ln.rf}</span></td>
            <td class="data-cell">${ln.data}</td>
            <td class="os-cell">${ln.gds_gdp || '—'}</td>
            <td class="os-cell">${osInfo}</td>
            <td class="horas-cell" style="padding-right:24px">${ln.horas_fmt}</td>`;
          tbody.appendChild(tr);
        }
        tbl.appendChild(tbody);
        ab.appendChild(tbl);
        ativBlock.appendChild(ab);
        gb.appendChild(ativBlock);
      }

      gdsBlock.appendChild(gb);
      pb.appendChild(gdsBlock);
    }

    projCard.appendChild(pb);
    root.appendChild(projCard);
  }

  document.getElementById('kpi-contratos').textContent = totalContratos;
  document.getElementById('kpi-colab').textContent = colaSet.size;

  // Reaplica busca ativa, se houver
  const q = document.getElementById('search-input').value;
  if (q) filterTree(q);
}

// ── seletor de modo ────────────────────────────────────────────────────────────
function setModo(modo) {
  currentModo = modo;
  document.querySelectorAll('.ord-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.modo === modo);
  });
  build();
}

// ── expand / collapse ────────────────────────────────────────────────────────
function expandAll() {
  document.querySelectorAll('.projeto-card, .gds-block, .ativ-block').forEach(el => el.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.projeto-card, .gds-block, .ativ-block').forEach(el => el.classList.remove('open'));
}

// ── busca ────────────────────────────────────────────────────────────────────
function filterTree(q) {
  q = q.toLowerCase().trim();
  const cards = document.querySelectorAll('.projeto-card');

  cards.forEach(card => {
    if (!q) {
      card.classList.remove('hidden');
      card.querySelectorAll('.gds-block, .ativ-block, tr').forEach(el => el.classList.remove('hidden'));
      return;
    }

    let cardVisible = false;
    card.querySelectorAll('.gds-block').forEach(gb => {
      let gbVisible = false;
      gb.querySelectorAll('.ativ-block').forEach(ab => {
        let abVisible = false;
        ab.querySelectorAll('tbody tr').forEach(tr => {
          const match =
            (card.dataset.proj || '').includes(q) ||
            (gb.dataset.gds  || '').includes(q) ||
            (ab.dataset.ativ || '').includes(q) ||
            (tr.dataset.nome || '').includes(q);
          tr.classList.toggle('hidden', !match);
          if (match) abVisible = true;
        });
        ab.classList.toggle('hidden', !abVisible);
        if (abVisible) { ab.classList.add('open'); gbVisible = true; }
      });
      gb.classList.toggle('hidden', !gbVisible);
      if (gbVisible) { gb.classList.add('open'); cardVisible = true; }
    });

    card.classList.toggle('hidden', !cardVisible);
    if (cardVisible) card.classList.add('open');
  });
}

// ── exportar CSV ─────────────────────────────────────────────────────────────
function exportCSV() {
  const bom = '\uFEFF';
  const blob = new Blob([bom + CSV_DATA], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'previa_faturamento.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── init ─────────────────────────────────────────────────────────────────────
build();
</script>
</body>
</html>
